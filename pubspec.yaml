name: game_hub
description: "A complete Flutter Team Project called Game Hub."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: ^3.0.7
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  url_launcher: ^6.3.2
  mockito: ^5.6.4
  build_runner: ^2.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
